<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>BM Outsourcing</title>

        <link rel="stylesheet" href="styles/index.css">
        <link rel="shortcut icon" href="assets/logos/logo.png" type="image/x-icon">
    </head>
    <body>
        <header class="nav">
            <div class="nav-bar">
                <div class="logo nav-links">
                    <img src="assets/logos/logo.png" alt="BM Outsourcing Logo" class="logo-img">
                    <p class="logo-name">BM Outsourcing</p>
                </div>
                <div class="desktop anchors nav-links">
                    <a href="#home" class="anchor">Home</a>
                    <a href="#services" class="anchor">Services</a>
                    <a href="#careers" class="anchor">Careers</a>
                    <a href="#about" class="anchor">About</a>
                </div>
                <div class="desktop btn nav-links">
                    <button class="btn-box"><a href="#" class="anchor">Join Us!</a></button>
                </div>
                <div class="mobile mb-btn nav-links">
                    <button class="btn-box" onclick="goBack()">
                        <img src="assets/icons/burger-light.png" alt="menu"
                        class="btn-icon">
                    </button>
                </div>
            </div>
            <div class="mobile mb-nav-bar hidden" id="mb-nav-bar">
                <div class="mb-logo mb-nav-links">
                    <img src="assets/logos/logo.png" alt="BM Outsourcing Logo" class="logo-img">
                    <p class="logo-name">BM Outsourcing</p>
                    <button class="btn-back" onclick="goBack()">
                        <img src="assets/icons/back-light.png" alt="" class="back-icon">
                    </button>
                </div>
                <div class="mb-anchors mb-nav-links">
                    <a href="#home" class="anchor">Home
                        <img src="assets/icons/arrow-filled-dark.png" alt="" class="anchor-icon">
                    </a>
                    <a href="#services" class="anchor">Services
                        <img src="assets/icons/arrow-filled-dark.png" alt="" class="anchor-icon">
                    </a>
                    <a href="#careers" class="anchor">Careers
                        <img src="assets/icons/arrow-filled-dark.png" alt="" class="anchor-icon">
                    </a>
                    <a href="#about" class="anchor">About
                        <img src="assets/icons/arrow-filled-dark.png" alt="" class="anchor-icon">
                    </a>
                </div>
                <div class="mb-nav-bar-btn">
                    <button class="btn-box"><a href="#" class="anchor">Join Us!</a></button>
                </div>
            </div>
        </header>
        <section class="home parent-container" id="home">
            
        </section>
    </body>
    <script src="scripts/backFunction.js"></script>
</html>
